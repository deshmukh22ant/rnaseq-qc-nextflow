name: Pipeline CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  test-pipeline:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repo
        uses: actions/checkout@v4

      - name: Install Nextflow
        uses: nf-core/setup-nextflow@v2

      - name: Install bioinformatics tools
        run: |
          wget -q http://opengene.org/fastp/fastp.0.23.4
          chmod +x fastp.0.23.4
          sudo mv fastp.0.23.4 /usr/local/bin/fastp
          sudo apt-get update -qq
          sudo apt-get install -y -qq fastqc
          pip install -q multiqc

      - name: Generate test data
        run: |
          mkdir -p test-data
          python3 -c "
          import gzip
          with gzip.open('test-data/test_sample.fastq.gz', 'wb') as f:
              for i in range(1, 1001):
                  f.write(f'@READ_{i}\n'.encode())
                  f.write(b'ATCGATCGATCGATCGATCGATCGATCGATCGATCGATCGATCGATCGATCG\n')
                  f.write(b'+\n')
                  f.write(b'IIIIIIIIIIIIIIIIIIIIIIIIIIIIIIIIIIIIIIIIIIIIIIIIIIIII\n')
          "
          echo "sample,fastq" > test-data/test_samplesheet.csv
          echo "test_sample,test-data/test_sample.fastq.gz" >> test-data/test_samplesheet.csv

      - name: Run pipeline with test data
        run: |
          nextflow run main.nf \
            -profile local \
            --input test-data/test_samplesheet.csv \
            --outdir results

      - name: Verify outputs exist
        run: |
          test -d results/fastp   && echo "✅ fastp output exists"   || (echo "❌ fastp missing"   && exit 1)
          test -d results/fastqc  && echo "✅ fastqc output exists"  || (echo "❌ fastqc missing"  && exit 1)
          test -f results/multiqc/multiqc_report.html && echo "✅ MultiQC report exists" || (echo "❌ MultiQC report missing" && exit 1)